name: Vendor knowledge-repo snapshot

# Federation Phase 1.5 — pulls a pinned snapshot of
# volivarii/actian-ds-knowledge into plugins/actian-design-system/vendor/.
# Runs nightly via cron + manual via workflow_dispatch. Regenerates the
# *-components.md mirrors via render-component-reference.js after each
# pull. Auto-bumps plugin.json (calendar YYYY.MM.PATCH) when there's a content
# diff so the marketplace cache propagates new content to designers.
#
# Required repo settings:
#   Settings → Actions → General → Workflow permissions → Allow GH Actions
#     to create and approve pull requests (already enabled)
#   Settings → General → Pull Requests → Allow auto-merge → ENABLED
#   Settings → General → Pull Requests → Allow squash merging → ENABLED
#   Settings → Branches → branch-protection on main: required status
#     checks must be configured + passing for auto-merge to fire
#     (otherwise `gh pr merge --auto` queues silently and never merges)

on:
  schedule:
    # 09:00 UTC — runs ~2h after volivarii/actian-ds-knowledge's
    # sync-from-figma.yml (07:00 UTC) so we vendor a fully-rendered
    # snapshot rather than racing the upstream sync.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Knowledge repo SHA to vendor (override; default resolves version range from vendored.json)'
        required: false
        type: string
      range:
        description: 'Override the semver range from vendored.json (e.g. "~0.2.0")'
        required: false
        type: string

jobs:
  vendor:
    name: Pull knowledge-repo snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Mint a token from the actian-ds-bot GitHub App so the PR appears
      # authored by the App, not by github-actions[bot]. The default
      # GITHUB_TOKEN suppresses downstream workflow triggers (flakily —
      # see specs/2026-05-11-plugin-vendor-bot-identity.md for forensics),
      # leaving bot PRs in BLOCKED state when the ruleset requires named
      # status checks. App-authored PRs fire pull_request events normally.
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Pull vendor snapshot
        working-directory: plugins/actian-design-system
        env:
          # The vendor core (vendor-snapshot-core.js) resolves the knowledge
          # release by calling the GitHub tags/refs API via curl. Those calls
          # are unauthenticated — capped at 60 req/hr PER IP — and GitHub
          # Actions runners share egress IPs across tenants, so the budget is
          # frequently already spent by neighbors. That surfaced as an
          # intermittent FATAL: `GitHub tags API returned non-array:
          # {"message":"API rate limit exceeded for <ip> ..."}` and a failed
          # nightly (run 28095989590, 2026-06-24). We seed a curl config with
          # the minted App-installation token (15,000 req/hr) so every curl the
          # core runs authenticates. This is done at the workflow level — NOT
          # by editing the snapshot core, which is vendored from the knowledge
          # repo (`clients` is in vendor-include.json) and would be reverted by
          # the next refresh, breaking the byte-identity drift guard.
          GH_VENDOR_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Scope the auth header to THIS step only via CURL_HOME (curl reads
          # $CURL_HOME/.curlrc ahead of $HOME/.curlrc). Each `run` is a fresh
          # shell, so the export does not leak to later steps. curl strips the
          # Authorization header on cross-host redirects (github.com →
          # codeload), so the tarball download never carries the token.
          CURL_HOME="$(mktemp -d)"
          export CURL_HOME
          umask 077
          printf 'header = "Authorization: Bearer %s"\n' "$GH_VENDOR_TOKEN" \
            > "$CURL_HOME/.curlrc"
          INPUT_SHA="${{ github.event.inputs.sha }}"
          INPUT_RANGE="${{ github.event.inputs.range }}"
          if [ -n "$INPUT_SHA" ]; then
            # Manual SHA override — bypasses range resolution.
            # resolved_version stays null because we don't know which tag
            # this SHA corresponds to.
            node scripts/vendor/vendor-snapshot.js --sha "$INPUT_SHA"
          elif [ -n "$INPUT_RANGE" ]; then
            # Range override (e.g., for testing a different range without
            # modifying vendored.json).
            node scripts/vendor/vendor-snapshot.js --range "$INPUT_RANGE"
          else
            # Default — read range from vendored.json. The script resolves
            # the range internally and writes resolved_version correctly.
            node scripts/vendor/vendor-snapshot.js
          fi

      - name: Read resolved values
        id: target
        working-directory: plugins/actian-design-system
        run: |
          SHA=$(jq -r '.knowledge_repo_resolved_sha' vendored.json)
          VERSION=$(jq -r '.knowledge_repo_resolved_version // ""' vendored.json)
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          LABEL="${VERSION:-$SHORT_SHA}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Resolved: $LABEL ($SHORT_SHA)"

      - name: Regenerate *-components.md from vendored registries
        # Replaces any *-components.md the snapshot may have placed
        # under vendor/components/dist/ — the knowledge repo should NOT
        # vendor these files; this step is the single source-of-truth
        # generator for the human-readable component mirrors. Post-Move-B:
        # mirrors land in vendor/components/dist/ (alongside the registries
        # they're derived from).
        working-directory: plugins/actian-design-system
        run: |
          node scripts/renderers/render-component-reference.js \
            --kit all \
            --output vendor/components/dist

      - name: Sync doc inventory counts
        # A re-vendor can change a registry component count. The doc-counts
        # guard (tests/integration/doc-counts.test.js) then fails on the now
        # stale prose, leaving this auto-merge PR stuck with no self-healing
        # path (observed on the v0.30.5 refresh: DS Kit 318→319). This rewrites
        # the managed docs (README, llms.txt, marketplace.json, plugin.json,
        # companion-context, figma-push-patterns) from the registries so the
        # guard passes. Idempotent no-op when no count changed. Shares its
        # source of truth (scripts/lib/doc-counts.js) with the guard, so the
        # two can't disagree.
        working-directory: plugins/actian-design-system
        run: |
          node scripts/vendor/sync-doc-counts.js

      - name: Regenerate the authoring vocabulary table
        # The vocabulary table in references/generate-flow/
        # ds-components-authoring.md is generated from the vendored dskit
        # registry + BUILT_SLUGS, and the drift gate
        # (tests/integration/authoring-table-sync.test.js) fails when they
        # disagree. Without this step, a vendor refresh that renames a
        # component or a variant axis would leave this auto-merge PR stuck
        # red with no self-healing path (same class as the doc-counts guard
        # above). Idempotent no-op when the registry change doesn't touch
        # the table.
        working-directory: plugins/actian-design-system
        run: |
          node scripts/renderers/render-authoring-table.js

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- plugins/actian-design-system/vendor/ plugins/actian-design-system/vendored.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Vendor already at SHA ${{ steps.target.outputs.sha }} — no changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Vendor diff:"
            git diff --stat -- plugins/actian-design-system/vendor/ plugins/actian-design-system/vendored.json
          fi

      - name: Auto-bump plugin.json (calendar)
        if: steps.diff.outputs.changed == 'true'
        # Calendar versioning (YYYY.MM.PATCH) — same month bumps PATCH, a new
        # month resets to YYYY.MM.0. Delegates to the shared, unit-tested bumper
        # so CI and manual bumps share one implementation. See CLAUDE.md
        # "Versioning". Runs from repo root (no working-directory) — both paths
        # are repo-root-relative; don't add a working-directory without also
        # stripping the plugins/actian-design-system/ prefix.
        run: |
          node plugins/actian-design-system/scripts/lib/bump-version.js \
            plugins/actian-design-system/.claude-plugin/plugin.json calendar

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          # App token (not default GITHUB_TOKEN) so the PR fires
          # pull_request workflows like pr-checks.yml against its head
          # SHA. Required for the ruleset's named status checks.
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "vendor(knowledge): refresh to ${{ steps.target.outputs.label }} + bump"
          title: "vendor(knowledge): refresh to ${{ steps.target.outputs.label }}"
          body: |
            Vendored snapshot of `volivarii/actian-ds-knowledge` updated to `${{ steps.target.outputs.label }}` (SHA `${{ steps.target.outputs.sha }}`).

            See https://github.com/volivarii/actian-ds-knowledge/tree/${{ steps.target.outputs.sha }} for source state.

            Auto-bumps plugin.json (calendar `YYYY.MM.PATCH`) so the marketplace cache propagates the new content to designers.
          branch: "vendor/refresh-${{ steps.target.outputs.short_sha }}"
          labels: vendor,knowledge-snapshot,auto-merge
          delete-branch: true
          add-paths: |
            plugins/actian-design-system/vendor/**
            plugins/actian-design-system/vendored.json
            plugins/actian-design-system/.claude-plugin/plugin.json
            README.md
            llms.txt
            USAGE.md
            .claude-plugin/marketplace.json
            plugins/actian-design-system/references/context/companion-context.md
            plugins/actian-design-system/references/figma/figma-push-patterns.md
            plugins/actian-design-system/references/generate-flow/ds-components-authoring.md

      - name: Enable auto-merge
        if: steps.diff.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        env:
          # Same App token — gh CLI auto-merge call attributes to the App.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash --repo "${{ github.repository }}"

      - name: Summarize
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### Vendor refreshed: ${{ steps.target.outputs.label }} (auto-bump applied)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Vendor: no changes (already at ${{ steps.target.outputs.label }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      # A vendor PR that goes RED just sits there. Nothing says so.
      #
      # That is exactly what happened: five vendor PRs (#237 to #241) stacked up
      # red between 2026-07-07 and 2026-07-12 while the plugin consumed no
      # knowledge for five days. They are opened with auto-merge, so when the
      # checks fail they silently do not merge, and each night quietly adds
      # another one to the pile. The pile IS the signal, and nobody was looking
      # at it.
      #
      # This runs nightly (the workflow is already here), so it is the natural
      # place to notice. One tracking issue, auto-closed when the queue drains.
      - name: Raise the alarm if the vendor queue is blocked
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Best-effort: this must never fail the refresh itself.
        run: |
          set +e
          open_prs=$(gh pr list --state open --label vendor --json number,title,createdAt --jq '.[] | [.number, .createdAt[0:10], .title] | @tsv' 2>/dev/null)
          if [ -z "$open_prs" ]; then
            for n in $(gh issue list --state open --label vendor-blocked --json number --jq '.[].number' 2>/dev/null); do
              gh issue close "$n" --comment "✅ The vendor queue has drained: no open vendor PRs remain." 2>/dev/null
            done
            exit 0
          fi

          # Any open vendor PR whose checks are failing means the pipe is clogged.
          blocked=""
          while IFS=$'\t' read -r num created title; do
            [ -z "$num" ] && continue
            state=$(gh pr view "$num" --json mergeStateStatus --jq .mergeStateStatus 2>/dev/null)
            if [ "$state" = "BLOCKED" ] || [ "$state" = "DIRTY" ]; then
              blocked="${blocked}- #${num} (opened ${created}): ${title} — \`${state}\`"$'\n'
            fi
          done <<< "$open_prs"

          if [ -z "$blocked" ]; then
            exit 0
          fi

          count=$(printf '%s' "$blocked" | grep -c '^- ')
          gh label create vendor-blocked --color B60205 --description "Vendor refresh PRs are stuck; the plugin is not consuming knowledge" 2>/dev/null
          body="**${count} vendor refresh PR(s) are stuck.** While they are, the plugin is consuming NO new knowledge: every substrate change is piling up on the wrong side of the pipe."$'\n\n'"${blocked}"$'\n'"This issue auto-closes when the queue drains."
          existing=$(gh issue list --state open --label vendor-blocked --json number --jq '.[0].number // empty' 2>/dev/null)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still blocked (${count} PR(s))."$'\n\n'"${blocked}" 2>/dev/null
          else
            gh issue create --title "🔴 Vendor refresh is blocked: the plugin is not consuming knowledge" --label vendor-blocked --body "$body" 2>/dev/null
          fi
          exit 0
