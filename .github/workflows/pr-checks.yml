name: PR checks

# Tier 1 PR gates for the Actian Design System plugin.
# Seven parallel jobs:
#   1. test            — runs the plugin's full test suite
#   2. json-syntax     — validates that all checked-in JSON files parse
#   3. version-bump    — ensures plugin.json is bumped when source changes
#   4. plugin-validate — `claude plugin validate` on the manifests (offline)
#   5. token-lint      — report-only token-quality lint (broken var-refs + WCAG contrast)
#   6. ds-quality-score — report-only DS Quality Score (token + fidelity rollup)
#   7. quality-gates    — report-only live fidelity (structural-scored) + DS Quality Score
#
# Runs on EVERY PR (no paths: filter). Avoids the path-filtered-required-
# check dead-PR gotcha: required status checks with paths: filters create a
# permanent "pending" state for unrelated PRs (e.g., docs-only or root-file-
# only changes) that don't trigger the workflow.
#
# version-bump is graceful — returns early when no plugin source files
# changed (see scripts/check-version-bump.js:111). json-syntax + test suite
# both run quickly (~2s combined); cost on non-plugin PRs is negligible.
#
# Tiered plan + rationale: see memory/project_ci_pr_checks.md.

on:
  pull_request:

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install plugin deps
        working-directory: plugins/actian-design-system
        run: npm install --no-audit --no-fund
      - name: Run test suite
        working-directory: plugins/actian-design-system
        run: |
          set -euo pipefail
          find tests -name '*.test.js' -type f -print0 \
            | xargs -0 node --test

  json-syntax:
    name: JSON syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Validate JSON files parse
        run: node .github/workflows/scripts/check-json-syntax.js

  version-bump:
    name: plugin.json bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Verify plugin.json version bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/workflows/scripts/check-version-bump.js

  plugin-validate:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install Claude Code CLI
        # Pinned to the 2.x major (mirrors the @v5 action pins above) so an
        # upstream major bump can't silently change `validate --strict` behavior
        # and break this gate mid-test-window.
        run: npm install -g @anthropic-ai/claude-code@2
      - name: Validate marketplace manifest (strict)
        # `claude plugin validate` is a fully offline manifest linter (no auth,
        # no network — verified). --strict treats warnings as errors.
        run: claude plugin validate --strict .claude-plugin/marketplace.json
      - name: Validate plugin manifest
        # Non-strict: the plugin ships a root CLAUDE.md, which the validator
        # flags as a warning ("not loaded as project context"). That file is
        # intentional (local --plugin-dir dev + the plugin's own rules), so we
        # don't fail on it. Re-add --strict here if/when CLAUDE.md is migrated.
        run: claude plugin validate plugins/actian-design-system

  token-lint:
    name: Token quality lint (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Lint design tokens
        working-directory: plugins/actian-design-system
        # Report-only for now (no --strict): surfaces findings to the run
        # summary without blocking. Promote to --strict once the source fix
        # (Task 9) has propagated to the vendored snapshot.
        run: |
          node scripts/lint/lint-tokens-cli.js | tee "$GITHUB_STEP_SUMMARY"

  ds-quality-score:
    name: DS Quality Score (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Compute DS Quality Score
        working-directory: plugins/actian-design-system
        # Report-only: prints the headline + gate breakdown to the run summary.
        # --no-write so CI never mutates the trend ledger (trend rows are
        # appended intentionally, not on every PR).
        run: |
          node scripts/quality/quality-score-cli.js --no-write | tee "$GITHUB_STEP_SUMMARY"

  quality-gates:
    name: Quality gates — fidelity (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true   # report-only: never reds the build (day 1)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable   # pin a specific version once Linux thresholds are calibrated
      - name: Compute live DS Quality Score (token + structural fidelity)
        working-directory: plugins/actian-design-system
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          node scripts/quality/quality-gates-cli.js --no-write | tee "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fidelity-pixel-diffs
          path: plugins/actian-design-system/tests/renderers/__fidelity__/diffs/
          if-no-files-found: ignore
