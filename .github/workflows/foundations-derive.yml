name: Derive foundations JSON from foundations.md

# Runs on PR events that touch the source MD or parser. Regenerates the
# foundation JSONs and pushes them back to the PR branch. Designers never
# need a local toolchain — they edit MD, CI handles the rest.
#
# Required repo setting (already enabled for the sync-from-figma workflow):
#   Settings → Actions → General → Workflow permissions → Allow GH Actions
#     to create and approve pull requests

on:
  pull_request:
    paths:
      - 'plugins/actian-design-system/docs/foundations.md'
      - 'plugins/actian-design-system/scripts/foundations/derive-foundations.js'
      - 'plugins/actian-design-system/scripts/foundations/foundations-parser/**'
      - 'plugins/actian-design-system/scripts/foundations/foundations.parser.json'

jobs:
  derive:
    name: Derive foundations JSONs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install plugin deps
        working-directory: plugins/actian-design-system
        run: npm install --no-audit --no-fund

      - name: Derive foundations JSONs
        working-directory: plugins/actian-design-system
        run: node scripts/foundations/derive-foundations.js

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- plugins/actian-design-system/docs/generated/foundations/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No JSON changes after regeneration."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "JSON changes detected:"
            git diff --stat -- plugins/actian-design-system/docs/generated/foundations/
          fi

      - name: Commit derived JSONs back to PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/actian-design-system/docs/generated/foundations/
          git commit -m "chore(foundations): regenerate JSONs from foundations.md"
          git push

      - name: Post semantic-diff comment
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/workflows/scripts/foundations-pr-comment.js

      - name: Summarize
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### Foundations derive: regenerated" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Foundations derive: no changes" >> "$GITHUB_STEP_SUMMARY"
          fi
