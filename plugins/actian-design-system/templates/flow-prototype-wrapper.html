<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{FEATURE_NAME}} — Interactive Prototype</title>

  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── Base ───────────────────────────────────────────────────────────────── */
    body {
      background: #1a1d23;
      color: #f0f2f5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Stage — holds all screens, scrolls horizontally if needed ─────────── */
    .proto-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 24px 24px 96px; /* 96px bottom keeps content above fixed nav */
      overflow: auto;
    }

    /* ─── Screen — the white canvas shown one at a time ─────────────────────── */
    .proto-screen {
      width: 1440px;
      min-height: 700px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 10px 15px -3px rgba(0, 0, 0, 0.4),
        0 25px 50px -12px rgba(0, 0, 0, 0.5);
      flex-shrink: 0;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.15s ease;
    }

    .proto-screen[aria-hidden="true"] {
      display: none;
    }

    .proto-screen--transitioning {
      opacity: 0;
    }

    /* ─── Bottom navigation bar ─────────────────────────────────────────────── */
    .proto-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #2d3648;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 16px;
      z-index: 100;
      min-height: 56px;
    }

    /* ─── Nav items ─────────────────────────────────────────────────────────── */
    .proto-nav__item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition:
        background 0.1s ease,
        border-color 0.1s ease,
        color 0.1s ease;
      white-space: nowrap;
      max-width: 160px;
    }

    .proto-nav__item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.8);
    }

    .proto-nav__item:active {
      background: rgba(255, 255, 255, 0.12);
    }

    .proto-nav__item--active {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.20);
      color: #ffffff;
    }

    /* ─── Step number circle ────────────────────────────────────────────────── */
    .proto-nav__number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.6);
      flex-shrink: 0;
      transition: background 0.1s ease, color 0.1s ease;
    }

    .proto-nav__item--active .proto-nav__number {
      background: #3b82f6;
      color: #ffffff;
    }

    /* ─── Label with overflow ellipsis ─────────────────────────────────────── */
    .proto-nav__label {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Screen indicator (top-right corner) ───────────────────────────────── */
    .proto-indicator {
      position: fixed;
      top: 16px;
      right: 20px;
      background: rgba(45, 54, 72, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      z-index: 101;
      letter-spacing: 0.02em;
    }

    /* ─── Keyboard shortcut hint (above nav) ────────────────────────────────── */
    .proto-hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 54, 72, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 99;
      pointer-events: none;
      white-space: nowrap;
    }

    .proto-hint kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.55);
      margin: 0 2px;
    }

    /* ─── Inline error message ───────────────────────────────────────────────── */
    .proto-error {
      font-size: 12px;
      color: #f87171;
      margin-top: 4px;
      display: none;
    }

    .proto-error--visible {
      display: block;
    }

    /* ─── Input error state ─────────────────────────────────────────────────── */
    .proto-input--error {
      border-color: #f87171 !important;
      outline-color: #f87171 !important;
    }

    /* ─── Top bar ─────────────────────────────────────────────────────────── */
    .proto-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 102;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; min-height: 48px;
      background: #2d3648; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .proto-topbar__title { font-size: 13px; font-weight: 600; color: #fff; }
    .proto-topbar__meta { font-size: 12px; color: rgba(255,255,255,0.55); }
    .proto-topbar__spacer { flex: 1; }
    .proto-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 2px; }
    .proto-toggle__btn {
      font: inherit; font-size: 12px; cursor: pointer;
      padding: 5px 12px; border: 0; border-radius: 6px;
      background: transparent; color: rgba(255,255,255,0.6);
    }
    .proto-toggle__btn--active { background: #3b82f6; color: #fff; }

    /* Push the stage below the fixed top bar */
    .proto-stage { padding-top: 64px; }

    /* ─── Overview (contact sheet) ────────────────────────────────────────── */
    .proto-stage--overview {
      display: grid; align-content: start;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px; padding: 72px 24px 24px; overflow: auto;
    }
    .proto-screen-cell { display: contents; }
    .proto-stage--overview .proto-screen-cell {
      display: block; cursor: pointer; position: relative;
      height: 240px; overflow: hidden; border-radius: 8px;
    }
    .proto-stage--overview .proto-screen {
      width: 1440px; transform: scale(0.25); transform-origin: top left;
      pointer-events: none; box-shadow: none; border-radius: 0;
      min-height: 0;
    }
  </style>
  <style>
{{FLOW_CSS}}
  </style>
</head>

<body
  x-data="{
    /* ── Active screen index (1-based) ── */
    screen: 1,

    /* ── Active view: 'prototype' (one at a time) | 'overview' (contact sheet) ── */
    view: 'prototype',

    /* ── Navigation path taken through the flow (e.g. 'happy', 'error') ── */
    path: '',

    /* ── Form field values keyed by field name ── */
    form: {},

    /* ── Validation error messages keyed by field name ── */
    errors: {},

    /* ── Screens nav metadata: [{ id, label }] — filled by the assembler ── */
    screens: {{SCREENS_ARRAY}},

    /* ── Navigate to a specific screen by 1-based index ── */
    goto(index) {
      if (index < 1 || index > this.screens.length) return;
      this.screen = index;
    },

    /* ── Move forward one screen ── */
    next() {
      this.goto(this.screen + 1);
    },

    /* ── Move back one screen ── */
    prev() {
      this.goto(this.screen - 1);
    },

    /* ── From Overview, click a screen to open it in Prototype view ── */
    enter(index) {
      this.view = 'prototype';
      this.goto(index);
    },

    validate() {
      this.errors = {};
      return Object.keys(this.errors).length === 0;
    },

    canSubmit() {
      return true;
    }
  }"

  @keyup.left.window="prev()"
  @keyup.right.window="next()"
>

  <header class="proto-topbar">
    <div class="proto-topbar__title">{{FEATURE_NAME}}</div>
    <div class="proto-topbar__meta">{{SHARE_META}}</div>
    <div class="proto-topbar__spacer"></div>
    <div class="proto-toggle" role="tablist" aria-label="View">
      <button class="proto-toggle__btn" :class="{ 'proto-toggle__btn--active': view === 'prototype' }" @click="view = 'prototype'" :aria-selected="view === 'prototype'">Prototype</button>
      <button class="proto-toggle__btn" :class="{ 'proto-toggle__btn--active': view === 'overview' }" @click="view = 'overview'" :aria-selected="view === 'overview'">Overview</button>
    </div>
  </header>

  <!-- ── Screen indicator (top-right): shows "N / total" ────────────────────── -->
  <div class="proto-indicator" x-text="`${screen} / ${screens.length}`" aria-live="polite" x-show="view === 'prototype'"></div>

  <!-- ── Keyboard hint bar ────────────────────────────────────────────────────── -->
  <div class="proto-hint" x-show="view === 'prototype'">
    <kbd>←</kbd> prev &nbsp;·&nbsp; <kbd>→</kbd> next &nbsp;·&nbsp; click step to jump
  </div>

  <!-- ASSEMBLER-STRIP-BEGIN
       Screen-fill contract (removed from the shareable deliverable by the assembler):
       the assembler replaces the {{SCREENS}} marker below with one cell block per screen —
         <div class="proto-screen-cell" @click="view === 'overview' && enter(N)">
           <div class="proto-screen" data-screen="N"
                x-show="view === 'overview' || screen === N"
                :aria-hidden="view === 'prototype' && screen !== N"> … </div>
         </div>
       In Prototype view the cell is display:contents and one screen shows; in Overview the
       cell is a fixed overflow:hidden grid item and the screen is transform:scale(0.25).
  ASSEMBLER-STRIP-END -->
  <main class="proto-stage" :class="{ 'proto-stage--overview': view === 'overview' }">
    <!-- {{SCREENS}} -->
  </main>

  <!-- ── Bottom navigation bar ────────────────────────────────────────────────── -->
  <!--
       x-for renders one button per entry in `screens`.
       :key keeps Alpine diffing stable.
       @click navigates to that screen.
       :class applies the active highlight to the currently visible screen.
  -->
  <nav class="proto-nav" aria-label="Prototype screen navigation" x-show="view === 'prototype'">
    <template x-for="item in screens" :key="item.id">
      <button
        class="proto-nav__item"
        :class="{ 'proto-nav__item--active': screen === item.id }"
        @click="goto(item.id)"
        :aria-current="screen === item.id ? 'step' : undefined"
        :title="item.label"
      >
        <span class="proto-nav__number" x-text="item.id"></span>
        <span class="proto-nav__label" x-text="item.label"></span>
      </button>
    </template>
  </nav>

  <script>
/* Alpine.js (vendored, inlined for offline use) */
{{INLINE_ALPINE}}
  </script>
</body>
</html>
