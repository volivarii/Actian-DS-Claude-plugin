<!-- FM Card 4: Content Guidelines
     When to use the component and content do's and don'ts.

     Placeholders:
       {{COMPONENT_NAME}} — The component's display name, used in the subtitle.
       {{WHEN_TO_USE}}    — HTML content describing when to use this component.
                            Can be a paragraph, a list, or multiple paragraphs.
                            Example:
                              <div class="section__subtitle">Use buttons to trigger actions
                              like submitting a form, opening a dialog, or confirming a
                              destructive operation. Do not use buttons for navigation.</div>
       {{DO_DONT_PAIRS}}  — One or more pairs of Do/Don't cards in a 2-column grid.
                            Each pair consists of a Do card and a Don't card side by side.
                            See the do-card pattern below for the markup structure.
-->
<div class="card" data-name="Content guidelines">
  <div class="card-header">
    <div class="card-header__title">Content guidelines</div>
    <!-- {{COMPONENT_NAME}} — Inserted into the subtitle for context -->
    <div class="card-header__subtitle">When to use {{COMPONENT_NAME}} and content do's and don'ts.</div>
  </div>
  <div class="card-content">

    <!-- When to use section -->
    <div class="section" data-name="When to use">
      <div class="section__title">When to use</div>
      <!-- {{WHEN_TO_USE}} — Descriptive content about when this component is appropriate.
           Example:
           <div class="section__subtitle">Use a button when the user needs to trigger
           an immediate action. For navigation, use a link instead.</div>
      -->
      {{WHEN_TO_USE}}
    </div>

    <!-- Do and Don't section -->
    <div class="section" data-name="Do and Don't">
      <div class="section__title">Do &amp; Don't</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <!-- {{DO_DONT_PAIRS}} — Replace with pairs of Do/Don't cards.
             Each pair is a Do card followed by a Don't card.

             Do card pattern:
             <div class="do-card">
               <div class="do-card__bar do-card__bar--do"></div>
               <div class="do-card__body do-card__body--do">
                 <div class="do-card__label do-card__label--do">Do</div>
                 {{DO_CONTENT}}
               </div>
             </div>

             Don't card pattern:
             <div class="do-card">
               <div class="do-card__bar do-card__bar--dont"></div>
               <div class="do-card__body do-card__body--dont">
                 <div class="do-card__label do-card__label--dont">Don't</div>
                 {{DONT_CONTENT}}
               </div>
             </div>

             {{DO_CONTENT}} and {{DONT_CONTENT}} are HTML fragments describing
             the correct and incorrect usage, e.g.:
               <p style="font-size:13px; color:#2D3648;">Use short, action-oriented labels
               like "Save" or "Submit".</p>
        -->
        {{DO_DONT_PAIRS}}
      </div>
    </div>

  </div>
</div>
