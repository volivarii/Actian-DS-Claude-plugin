<!-- FM Card 1: Page Header
     Dark card introducing the component brief.

     Placeholders:
       {{SOURCE_LABEL}}          — Kit identifier, e.g., "Fat Marker Wireframe Kit"
       {{COMPONENT_NAME}}        — Display name of the component, e.g., "Button"
       {{COMPONENT_DESCRIPTION}} — One-line summary of the component's purpose
-->
<div class="card card--dark" data-name="Page header">
  <div class="page-header">
    <!-- {{SOURCE_LABEL}} — The kit or system this component belongs to -->
    <div class="page-header__source">{{SOURCE_LABEL}}</div>

    <!-- {{COMPONENT_NAME}} — The component's display name (large heading) -->
    <div class="page-header__title">{{COMPONENT_NAME}}</div>

    <!-- {{COMPONENT_DESCRIPTION}} — Brief description of what this component does -->
    <div class="page-header__subtitle">{{COMPONENT_DESCRIPTION}}</div>
  </div>
</div>
