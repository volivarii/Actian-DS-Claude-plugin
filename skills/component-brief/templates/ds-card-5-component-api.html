<!-- ============================================================
     CARD 5 — Component API
     Documents all configurable properties (props) of the component
     with their types, defaults, allowed values, and usage notes.
     ============================================================ -->

<div class="brief-card" data-name="Component API">

  <div class="card-section-header">
    <div class="card-section-header__title" data-name="Section title">Component API</div>
    <div class="card-section-header__subtitle" data-name="Section subtitle">Configurable properties, types, defaults, and allowed values</div>
  </div>

  <div class="card-content">

    <div class="section" data-name="Props table">
      <table class="spec-table" data-name="Component props">
        <thead>
          <tr>
            <th style="width: 48px;"></th>
            <th>Property</th>
            <th>Type</th>
            <th>Default</th>
            <th>Values</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          <!-- {{PROPS_ROWS}} — One <tr> per component property.
               First column: required/optional badge
               Second column: property name in monospace
               Third column: type in purple monospace
               Fourth column: default value in green monospace
               Fifth column: allowed values list
               Sixth column: usage notes

               Example:
                 <tr>
                   <td><span class="prop-required">REQ</span></td>
                   <td><span class="prop-name">hierarchy</span></td>
                   <td><span class="prop-type">enum</span></td>
                   <td><span class="prop-default">"primary"</span></td>
                   <td><span class="prop-values">"primary" | "secondary-color" | "secondary-gray" | "tertiary-color" | "tertiary-gray" | "link-color" | "link-gray"</span></td>
                   <td>Visual prominence level. Maps to DS2026 Hierarchy axis.</td>
                 </tr>
                 <tr>
                   <td><span class="prop-required">REQ</span></td>
                   <td><span class="prop-name">label</span></td>
                   <td><span class="prop-type">string</span></td>
                   <td><span class="prop-default">—</span></td>
                   <td><span class="prop-values">any string</span></td>
                   <td>Visible button text. Use sentence case per content guidelines.</td>
                 </tr>
                 <tr>
                   <td><span class="prop-optional">OPT</span></td>
                   <td><span class="prop-name">size</span></td>
                   <td><span class="prop-type">enum</span></td>
                   <td><span class="prop-default">"default"</span></td>
                   <td><span class="prop-values">"default" | "small"</span></td>
                   <td>Default = 40px height, Small = 32px height.</td>
                 </tr>
                 <tr>
                   <td><span class="prop-optional">OPT</span></td>
                   <td><span class="prop-name">icon</span></td>
                   <td><span class="prop-type">enum</span></td>
                   <td><span class="prop-default">"default"</span></td>
                   <td><span class="prop-values">"default" | "leading" | "trailing" | "only"</span></td>
                   <td>Icon placement. "only" hides label and shows icon in a square container.</td>
                 </tr>
                 <tr>
                   <td><span class="prop-optional">OPT</span></td>
                   <td><span class="prop-name">destructive</span></td>
                   <td><span class="prop-type">boolean</span></td>
                   <td><span class="prop-default">false</span></td>
                   <td><span class="prop-values">true | false</span></td>
                   <td>Applies error-primary color for destructive actions (delete, remove).</td>
                 </tr>
                 <tr>
                   <td><span class="prop-optional">OPT</span></td>
                   <td><span class="prop-name">disabled</span></td>
                   <td><span class="prop-type">boolean</span></td>
                   <td><span class="prop-default">false</span></td>
                   <td><span class="prop-values">true | false</span></td>
                   <td>Disables interaction. Uses disabled-primary fill + disabled-secondary bg.</td>
                 </tr>
          -->
          {{PROPS_ROWS}}
        </tbody>
      </table>
    </div>

  </div>

</div>
