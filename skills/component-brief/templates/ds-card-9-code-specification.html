         CODE BLOCK

              <span class="prop">height</span><span class="punc">:</span> <span class="fn">var</span><span class="punc">(</span><span class="str">--zen-size-2xl</span><span class="punc">,</span> <span class="val">48px</span><span class="punc">)</span><span class="punc">;</span>
              ...
            <span class="punc">}</span>

         4. SIZE VARIANT OVERRIDES

              <span class="prop">height</span><span class="punc">:</span> <span class="fn">var</span><span class="punc">(</span><span class="str">--zen-size-xl</span><span class="punc">,</span> <span class="val">40px</span><span class="punc">)</span><span class="punc">;</span>

            <span class="punc">}</span>

            <span class="sel">.zen-component--primary</span><span class="tag">:active</span> <span class="punc">{</span>

            <span class="punc">}</span>

         IMPORTANT:
         - Every CSS value MUST use var() with a --zen-* token and a fallback
