<!-- ============================================================
     CARD 4 — Design Tokens
     Documents all tokens used by the component: colors per
     variant/state, sizing/spacing values, and typography specs.
     ============================================================ -->

<div class="brief-card" data-name="Design tokens">

  <div class="card-section-header">
    <div class="card-section-header__title" data-name="Section title">Design tokens</div>
    <div class="card-section-header__subtitle" data-name="Section subtitle">Color, sizing, spacing, and typography tokens mapped to each variant and state</div>
  </div>

  <div class="card-content">

    <!-- ========================================================
         SUB-SECTION 1: Color Tokens
         Table listing background and text color tokens for each
         variant×state combination, with inline color swatches.
         ======================================================== -->
    <div class="section" data-name="Color tokens">
      <div class="section-title">Color tokens</div>

      <table class="spec-table" data-name="Color tokens table">
        <thead>
          <tr>
            <th>Variant &middot; State</th>
            <th>Background</th>
            <th>Text / Icon</th>
          </tr>
        </thead>
        <tbody>
          <!-- {{COLOR_TOKEN_ROWS}} — One <tr> per variant×state combination.
               Each color cell should include a swatch dot + token name in code tag.
               Example:
                 <tr>
                   <td>Primary &middot; Enabled</td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #0550DC;"></span>
                       <code>theme-primary</code>
                     </span>
                   </td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #FFFFFF;"></span>
                       <code>interactive-enabled-inverse</code>
                     </span>
                   </td>
                 </tr>
                 <tr>
                   <td>Primary &middot; Hovered</td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #0550DC;"></span>
                       <code>theme-primary</code> + <code>interactive-hovered-primary</code> overlay
                     </span>
                   </td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #FFFFFF;"></span>
                       <code>interactive-enabled-inverse</code>
                     </span>
                   </td>
                 </tr>
                 <tr>
                   <td>Primary &middot; Disabled</td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #9898A7;"></span>
                       <code>interactive-disabled-primary</code>
                     </span>
                   </td>
                   <td>
                     <span class="swatch">
                       <span class="swatch__dot" style="background: #FFFFFF;"></span>
                       <code>interactive-enabled-inverse</code>
                     </span>
                   </td>
                 </tr>
          -->
          {{COLOR_TOKEN_ROWS}}
        </tbody>
      </table>
    </div>

    <div class="card-divider"></div>

    <!-- ========================================================
         SUB-SECTION 2: Sizing & Spacing
         Table listing dimensional properties with their tokens
         and resolved values.
         ======================================================== -->
    <div class="section" data-name="Sizing and spacing">
      <div class="section-title">Sizing &amp; spacing</div>

      <table class="spec-table" data-name="Sizing spacing table">
        <thead>
          <tr>
            <th>Property</th>
            <th>Token</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
          <!-- {{SIZING_ROWS}} — One <tr> per dimensional property.
               Example:
                 <tr>
                   <td>Height (default)</td>
                   <td><code>size-2xl</code></td>
                   <td>40px</td>
                 </tr>
                 <tr>
                   <td>Height (small)</td>
                   <td><code>size-xl</code></td>
                   <td>32px</td>
                 </tr>
                 <tr>
                   <td>Horizontal padding</td>
                   <td><code>spacing-md</code></td>
                   <td>16px</td>
                 </tr>
                 <tr>
                   <td>Vertical padding</td>
                   <td><code>spacing-xs</code></td>
                   <td>8px</td>
                 </tr>
                 <tr>
                   <td>Border radius</td>
                   <td><code>radius-sm</code></td>
                   <td>6px</td>
                 </tr>
                 <tr>
                   <td>Focus ring width</td>
                   <td><code>width-focus</code></td>
                   <td>2px</td>
                 </tr>
          -->
          {{SIZING_ROWS}}
        </tbody>
      </table>
    </div>

    <div class="card-divider"></div>

    <!-- ========================================================
         SUB-SECTION 3: Typography
         Inline specimen card showing the rendered text at the
         component's typography token, plus token details.
         ======================================================== -->
    <div class="section" data-name="Typography">
      <div class="section-title">Typography</div>

      <!-- {{TYPOGRAPHY_SPECIMEN}} — Rendered text sample + token details.
           Show the actual text style as it appears in the component,
           alongside the token name and resolved values.
           Example:
             <div style="display: flex; gap: 48px; align-items: center;">
               <div style="padding: 24px 32px; background: #FAFAFA; border: 1px solid var(--zen-color-border-default); border-radius: 12px;">
                 <span style="font-family: 'Roboto', sans-serif; font-weight: 500; font-size: 14px; line-height: 20px; letter-spacing: 0.2px; color: var(--zen-color-text-primary);">
                   Button Label
                 </span>
               </div>
               <div class="anatomy-props">
                 <div class="anatomy-prop">
                   <div class="anatomy-prop__label">TOKEN</div>
                   <div class="anatomy-prop__value"><code>label-standard</code></div>
                 </div>
                 <div class="anatomy-prop">
                   <div class="anatomy-prop__label">FONT</div>
                   <div class="anatomy-prop__value">Roboto Medium 14px / 20px</div>
                 </div>
                 <div class="anatomy-prop">
                   <div class="anatomy-prop__label">TRACKING</div>
                   <div class="anatomy-prop__value">0.2px</div>
                 </div>
               </div>
             </div>
      -->
      {{TYPOGRAPHY_SPECIMEN}}
    </div>

  </div>

</div>
